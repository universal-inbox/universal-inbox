version: "0.6"

processes:
  ui-api:
    command: "just api run-api"
    depends_on:
      postgresql:
        condition: process_started
      redis:
        condition: process_started
    availability:
      restart: no
    shutdown:
      signal: 9
      timeout_seconds: 1
    disabled: true
    namespace: "universal-inbox"

  ui-workers:
    command: "just api run-workers"
    depends_on:
      postgresql:
        condition: process_started
      redis:
        condition: process_started
    availability:
      restart: no
    disabled: true
    namespace: "universal-inbox"

  ui-web:
    command: "just web run false"
    availability:
      restart: no
    is_tty: true
    disabled: true
    namespace: "universal-inbox"

  build-tailwind:
    command: "just web run-tailwind"
    is_tty: true
    disabled: true
    namespace: "universal-inbox"

  bundle-js:
    command: "just web run-bundle-js"
    is_tty: true
    disabled: true
    namespace: "universal-inbox"

  caddy:
    command: "caddy run --config=$CADDY_CONFIG"
    is_tty: true
    disabled: true
    availability:
      restart: on_failure
      max_restarts: 5
    shutdown:
      command: "caddy stop"
